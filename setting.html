<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تنظیمات بازی</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/setting.css">
</head>
<body class="bg-dark text-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">⚙️ تنظیمات</h1>

    <div class="settings-card p-4 rounded-4 shadow">
      <!-- زبان -->
      <div class="mb-4">
        <label for="lang-select" class="form-label">زبان / Language:</label>
        <select id="lang-select" class="form-select">
          <option value="fa">فارسی</option>
          <option value="en">English</option>
        </select>
      </div>

      <!-- تم -->
      <div class="mb-4">
        <label class="form-label">تم:</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="theme-switch">
          <label class="form-check-label" for="theme-switch" data-text-fa="تم تاریک" data-text-en="Dark Theme">تم تاریک</label>
        </div>
      </div>

      <!-- فونت -->
      <div class="mb-4">
        <label class="form-label" data-text-fa="فونت:" data-text-en="Font:">فونت:</label>
        <div>
          <input type="radio" name="font-radio" id="font-vazir" value="vazir" checked>
          <label for="font-vazir" data-text-fa="وزیر" data-text-en="Vazir">وزیر</label>
          <input type="radio" name="font-radio" id="font-system" value="system">
          <label for="font-system" data-text-fa="سیستم" data-text-en="System">سیستم</label>
        </div>
      </div>

      <!-- ریست بازی/امتیاز -->
      <div class="mb-4">
        <button id="reset-all-btn" class="btn btn-outline-danger w-100">ریست همه چیز / Reset All</button>
      </div>

      <div class="mt-3 text-center">
        <a href="index.html" id="back-menu" class="btn btn-light">بازگشت به منو / Back to menu</a>
      </div>
    </div>
  </div>

  <script src="js/setting.js"></script>
</body>
</html>
